<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratchpad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>Draftpad</h2>
          <button id="btn-new-note" title="New Note">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
        <ul id="note-list" class="note-list"></ul>
      </aside>

      <main class="main-area">
        <header class="toolbar">
          <button
            id="btn-toggle-sidebar"
            title="Toggle Sidebar"
            class="icon-btn"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-panel-left-close-icon lucide-panel-left-close"
            >
              <rect width="18" height="18" x="3" y="3" rx="2" />
              <path d="M9 3v18" />
              <path d="m16 15-3-3 3-3" />
            </svg>
          </button>
          <div class="spacer"></div>
          <button id="btn-copy" title="Copy Content">Copy</button>
          <button id="btn-clear" title="Clear Content">Clear</button>
          <button id="btn-delete" title="Delete Note">Delete</button>
          <button id="btn-toggle-preview" title="Toggle Preview">
            Preview
          </button>
        </header>
        <div class="editor-container">
          <textarea
            id="editor"
            placeholder="Start typing..."
            spellcheck="false"
          ></textarea>
          <div id="preview" class="preview-area hidden"></div>
        </div>
      </main>
    </div>
    <script src="storage.js"></script>
    <script src="notes.js"></script>
    <script src="preview.js"></script>
    <script src="main.js"></script>
  </body>
</html>
